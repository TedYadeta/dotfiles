apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-deploy
  name: nginx-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-deploy
  strategy: {}
  template:
    metadata:
      labels:
        app: nginx-deploy
    spec:
      containers:
        - image: nginx:latest
          name: nginx
          resources: {}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nginx-serv
  name: nginx-serv
spec:
  ports:
    - name: $-$
      port: $
      protocol: $$
      targetPort: $
  selector:
    app: nginx-serv
  type: ClusterIP
status:
  loadBalancer: {}
